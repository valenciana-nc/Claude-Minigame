<svg width="960" height="340" viewBox="0 0 960 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Clawd Runner</title>
  <desc id="desc">A colorful terminal arcade banner with Clawd, flying bugs, cacti, and pixel art controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101827"/>
      <stop offset="0.45" stop-color="#152036"/>
      <stop offset="1" stop-color="#0B111E"/>
    </linearGradient>
    <linearGradient id="rim" x1="36" y1="38" x2="924" y2="302" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F28A54"/>
      <stop offset="0.28" stop-color="#F7C948"/>
      <stop offset="0.56" stop-color="#35D0BA"/>
      <stop offset="0.8" stop-color="#B779FF"/>
      <stop offset="1" stop-color="#FF6DAE"/>
    </linearGradient>
    <filter id="softShadow" x="-8%" y="-12%" width="116%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    .title { font: 900 76px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0; }
    .subtitle { font: 600 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0; }
    .badge { font: 800 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0; }
  </style>

  <rect width="960" height="340" rx="30" fill="url(#bg)"/>
  <rect x="22" y="22" width="916" height="296" rx="24" stroke="url(#rim)" stroke-width="4"/>
  <rect x="40" y="42" width="880" height="258" rx="18" fill="#0F172A" stroke="#263247" stroke-width="2"/>
  <rect x="40" y="42" width="880" height="42" rx="18" fill="#161F31"/>
  <rect x="40" y="72" width="880" height="12" fill="#161F31"/>
  <circle cx="68" cy="63" r="7" fill="#FF6B6B"/>
  <circle cx="92" cy="63" r="7" fill="#FFD166"/>
  <circle cx="116" cy="63" r="7" fill="#3DDC97"/>
  <text class="mono" x="150" y="69" fill="#94A3B8" font-size="17">claude-run --arcade</text>

  <path d="M42 244C122 225 171 258 247 236C321 214 388 230 454 211C542 185 626 228 702 202C776 177 841 192 918 171V300H42V244Z" fill="#172554" opacity="0.72"/>
  <path d="M42 265C109 249 162 269 234 255C315 239 370 267 454 246C538 224 624 260 705 238C781 218 841 229 918 207V300H42V265Z" fill="#123B4E" opacity="0.78"/>
  <path d="M40 278H920" stroke="#64748B" stroke-width="3" stroke-dasharray="18 11"/>
  <path d="M40 286H920" stroke="#F28A54" stroke-width="2" stroke-dasharray="3 13" opacity="0.75"/>

  <g filter="url(#softShadow)" transform="translate(74 116)">
    <rect x="34" y="0" width="144" height="22" fill="#F79A57"/>
    <rect x="18" y="22" width="176" height="28" fill="#F28A54"/>
    <rect x="0" y="50" width="212" height="36" fill="#E77945"/>
    <rect x="18" y="86" width="176" height="28" fill="#F28A54"/>
