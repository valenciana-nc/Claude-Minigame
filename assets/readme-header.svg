  <g class="mono" font-weight="900">
    <text x="344" y="148" class="title" fill="#020617" opacity="0.7">CLAWD</text>
    <text x="340" y="142" class="title" fill="#F8FAFC">CLAWD</text>
    <text x="344" y="214" class="title" fill="#020617" opacity="0.7">RUNNER</text>
